<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <rect width="100" height="100" fill="#ffffff"/>
  <g fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center circle -->
    <circle cx="50" cy="50" r="20"/>
    <!-- 6 petal circles -->
    <circle cx="50" cy="30" r="20"/>
    <circle cx="67.32" cy="40" r="20"/>
    <circle cx="67.32" cy="60" r="20"/>
    <circle cx="50" cy="70" r="20"/>
    <circle cx="32.68" cy="60" r="20"/>
    <circle cx="32.68" cy="40" r="20"/>
    <!-- Triangle 1 (upward) -->
    <polygon points="50,30 67.32,60 32.68,60"/>
    <!-- Triangle 2 (downward) -->
    <polygon points="67.32,40 50,70 32.68,40"/>
    <!-- Outer circle -->
    <circle cx="50" cy="50" r="37"/>
  </g>
</svg>
